name: Next.js CI Pipeline

on:
  push:
    branches: ["develop", "main"]
  pull_request:
    branches: ["develop", "main"]

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src

    steps:
      # Bước 1: Clone source code về môi trường CI
      - name: Checkout repository
        uses: actions/checkout@v4

      # Bước 2: Cài đặt Node.js (khuyên dùng bản LTS mới nhất như 20)
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependcy-path: src/package-lock.json

      # Bước 3: Cài đặt dependencies (dùng ci thay vì install để chuẩn hóa theo package-lock.json)
      - name: Install dependencies
        run: npm ci

      # Bước 4: Chạy Linter để kiểm tra format code (dựa vào file eslint.config.mjs của bạn)
      - name: Run ESLint
        run: npm run lint

      # Bước 5: Chạy toàn bộ Unit/Integration Test và check Coverage 75%
      - name: Run Tests with Coverage
        run: npm run test -- --coverage
